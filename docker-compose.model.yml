# Racine du repo : docker compose -f docker-compose.model.yml up --build
# Bedrock : AWS_PROFILE + volume ~/.aws (après aws sso login sur l’hôte). Voir model/README.md.
services:
  model:
    build:
      context: .
      dockerfile: src/backend/model/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      AWS_REGION: ${AWS_REGION:-eu-west-3}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-west-3}
      AWS_PROFILE: ${AWS_PROFILE:-}
    volumes:
      - ~/.aws:/root/.aws:ro
