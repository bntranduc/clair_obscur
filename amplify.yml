# AWS Amplify Hosting — app Next.js dans src/frontend (monorepo).
# Console : région eu-west-3, branche Git.
#
# Variables d’environnement (Hosting → Variables → rebuild) pour EC2 HTTP derrière HTTPS :
#   NEXT_PUBLIC_DASHBOARD_API_PROXY=1
#   DASHBOARD_API_URL=http://ec2-....eu-west-3.compute.amazonaws.com:8010
# Détail : src/frontend/.env.example
version: 1
applications:
  - appRoot: src/frontend
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20
            - nvm use 20
            - node -v && npm -v
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
