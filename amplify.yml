version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v && npm -v
        - |
            if [ -d src/frontend ]; then
              cd src/frontend && npm ci
            else
              npm ci
            fi
    build:
      commands:
        - |
            if [ -d src/frontend ]; then
              cd src/frontend && npm run build
            else
              npm run build
            fi
  artifacts:
    baseDirectory: src/frontend/.next
    files:
      - "**/*"
  cache:
    paths:
      - src/frontend/node_modules/**/*
      - node_modules/**/*