# Amplify Hosting — Next.js 15 (app sous src/frontend/).
#
# Après le build, .next est à la racine du clone (baseDirectory: .next). Une copie
# sous src/frontend/.next est aussi créée : selon la config monorepo, Amplify peut
# résoudre l’artefact depuis la racine du repo ou depuis src/frontend.
#
# Variables Amplify : voir src/frontend/.env.example et src/frontend/AMPLIFY.md
#
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v && npm -v
        - |
            if [ -d src/frontend ]; then
              cd src/frontend && npm ci
            else
              npm ci
            fi
    build:
      commands:
        - |
            if [ -d src/frontend ]; then
              (cd src/frontend && npm run build)
              rm -rf .next
              mv src/frontend/.next .next
              rm -rf src/frontend/.next
              cp -a .next src/frontend/.next
            else
              npm run build
            fi
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - src/frontend/node_modules/**/*
      - node_modules/**/*
