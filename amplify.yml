version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd src/frontend && nvm install 20 && nvm use 20 && node -v && npm -v && npm ci
    build:
      commands:
        - cd src/frontend && npm run build
  artifacts:
    baseDirectory: src/frontend/.next
    files:
      - "**/*"
  cache:
    paths:
      - src/frontend/node_modules/**/*