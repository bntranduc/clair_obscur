# Amplify Hosting — Next.js 15 (app sous src/frontend/).
#
# Après le build, le dossier .next est toujours déplacé à la racine du clone pour que
# baseDirectory: .next fonctionne que la console Amplify soit à la racine du repo
# ou avec « racine monorepo » = src/frontend.
#
# Variables Amplify : voir src/frontend/.env.example et src/frontend/AMPLIFY.md
#
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v && npm -v
        - |
            if [ -d src/frontend ]; then
              cd src/frontend && npm ci
            else
              npm ci
            fi
    build:
      commands:
        - |
            if [ -d src/frontend ]; then
              (cd src/frontend && npm run build)
              rm -rf .next
              mv src/frontend/.next .next
            else
              npm run build
            fi
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - src/frontend/node_modules/**/*
      - node_modules/**/*
